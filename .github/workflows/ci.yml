name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      ENV: test
      DATABASE_URL: sqlite:///./test.db
      JWT_PUBLIC_KEY: |
        -----BEGIN PUBLIC KEY-----
        TEST_PUBLIC_KEY
        -----END PUBLIC KEY-----
      JWT_PRIVATE_KEY: |
        -----BEGIN PRIVATE KEY-----
        TEST_PRIVATE_KEY
        -----END PRIVATE KEY-----
      JWT_AUDIENCE: agentia-tests
      JWT_ISSUER: agentia-tests
      WEBHOOK_FAIL_CLOSED: "false"
      AUTH_SECURITY_FAIL_CLOSED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=10

      - name: Compile check
        run: python -m compileall app tests

      - name: Security compliance grep
        run: |
          ./scripts/check_legacy_domain_terms.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
