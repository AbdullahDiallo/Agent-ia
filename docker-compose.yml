version: "3.9"

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: salma_school
      POSTGRES_USER: salma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salma -d salma_school"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (rate limiting, auth, caching)
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_production}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://salma:${DB_PASSWORD:-changeme_in_production}@db:5432/salma_school
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_in_production}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ============================================
  # Database migrations (run once)
  # ============================================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://salma:${DB_PASSWORD:-changeme_in_production}@db:5432/salma_school
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # Frontend Dashboard (optional, for dev)
  # ============================================
  # frontend:
  #   build:
  #     context: ./front/dashboard
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - api

volumes:
  pgdata:
  redisdata:
